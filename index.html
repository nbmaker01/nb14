<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>WebXR A-Frame GLB Example</title>
  <!-- A-Frame 라이브러리 불러오기 -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
</head>
<body>
  <!-- A-Frame 씬 시작 -->
  <a-scene
    vr-mode-ui="enabled: true"  <!-- VR 버튼 활성화 -->
    device-orientation-permission-ui="enabled: true"
  >

    <!-- ========================= -->
    <!-- 자산(Assets) 미리 로드 -->
    <!-- ========================= -->
    <a-assets>
      <!-- GLB 3D 모델 로드 -->
      <a-asset-item id="model" src="model.glb"></a-asset-item>
    </a-assets>

    <!-- ========================= -->
    <!-- 카메라 + 이동 컨트롤 -->
    <!-- ========================= -->
    <a-entity
      id="player"
      position="0 1.6 3"  <!-- 사람 눈높이 + 시작 위치 -->
      camera
      look-controls="pointerLockEnabled: true" <!-- 마우스로 시점 회전 -->
      wasd-controls="acceleration: 20" <!-- WASD 이동 -->
    >
    </a-entity>

    <!-- ========================= -->
    <!-- VR 컨트롤러 -->
    <!-- ========================= -->
    <!-- 왼손 컨트롤러 -->
    <a-entity
      laser-controls="hand: left"
      raycaster="objects: .clickable"
    ></a-entity>

    <!-- 오른손 컨트롤러 -->
    <a-entity
      laser-controls="hand: right"
      raycaster="objects: .clickable"
    ></a-entity>

    <!-- ========================= -->
    <!-- 바닥 -->
    <!-- ========================= -->
    <a-plane
      rotation="-90 0 0"
      width="50"
      height="50"
      color="#7BC8A4"
    ></a-plane>

    <!-- ========================= -->
    <!-- 하늘 -->
    <!-- ========================= -->
    <a-sky color="#87CEEB"></a-sky>

    <!-- ========================= -->
    <!-- 조명 -->
    <!-- ========================= -->
    <!-- 전체를 밝히는 기본 조명 -->
    <a-entity light="type: ambient; intensity: 0.5"></a-entity>

    <!-- 방향성 조명 (태양 느낌) -->
    <a-entity
      light="type: directional; intensity: 1"
      position="5 10 7"
    ></a-entity>

    <!-- ========================= -->
    <!-- 3D 모델 -->
    <!-- ========================= -->
    <a-entity
      gltf-model="#model"   <!-- GLB 모델 연결 -->
      position="0 0 -3"     <!-- 앞쪽 중앙 -->
      scale="2 2 2"         <!-- 적당히 크게 -->
      rotation="0 30 0"     <!-- 약간 회전 -->
    ></a-entity>

  </a-scene>
</body>
</html>
